<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBOS Styreleder Dashboard - Complete Holistic View</title>
<style>
  :root {
    /* OBOS Brand Palette */
    --obos-blue: #1B3F8B;
    --obos-blue-deep: #122B61;
    --obos-mint: #bedfec;
    --obos-mint-deep: #5b9eb5;
    --obos-green: #006241;
    --obos-green-bright: #69B34C;
    --bg-soft: #f6f7fa;
    --white: #ffffff;
    --text-main: #1f2433;
    --text-muted: #4d5468;
    --text-faint: #8089a0;
    --border: #d8dce8;
    --urgent: #b04545;
    --urgent-bg: #fbeae8;
    --routine: #d9822b;
    --routine-bg: #fdf5e6;
    --sec-color: #5a6378;
    --sec-bg: #eef0f4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bg-soft); color: var(--text-main);
    font-family: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
    line-height: 1.6; -webkit-font-smoothing: antialiased;
  }

  .container { max-width: 1300px; margin: 0 auto; padding: 32px 24px; }

  /* Header & Privacy Status */
  .header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border);
  }
  .brand h1 { font-size: 24px; color: var(--obos-blue-deep); margin-bottom: 4px; }
  .privacy-badge {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; color: var(--text-muted);
    background: #e8ecf2; padding: 6px 12px; border-radius: 20px;
  }

  /* Vinter-Trygg Monitor */
  .vinter-trygg {
    display: flex; align-items: center; gap: 12px;
    background: var(--white); padding: 12px 20px; border-radius: 12px;
    border: 1px solid var(--obos-mint-deep); box-shadow: 0 2px 8px rgba(27, 63, 139, 0.05);
  }
  .vinter-trygg .indicator {
    width: 10px; height: 10px; background: var(--obos-mint-deep);
    border-radius: 50%; animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(91, 158, 181, 0.4); }
    70% { box-shadow: 0 0 0 6px rgba(91, 158, 181, 0); }
    100% { box-shadow: 0 0 0 0 rgba(91, 158, 181, 0); }
  }

  /* Stats Row */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--white); padding: 24px; border-radius: 16px;
    border: 1px solid var(--border); box-shadow: 0 4px 12px rgba(31, 36, 51, 0.03);
  }
  .stat-card h3 {
    font-size: 14px; text-transform: uppercase; letter-spacing: 0.05em;
    color: var(--text-muted); margin-bottom: 8px;
  }
  .stat-card .value { font-size: 32px; font-weight: 700; color: var(--obos-blue-deep); }

  /* Panels (BMS, Eco, Security) */
  .hud-container {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
    gap: 20px; margin-bottom: 32px;
  }
  
  .panel {
    background: var(--white); border-radius: 16px; border: 1px solid var(--border);
    padding: 24px; box-shadow: 0 4px 12px rgba(31, 36, 51, 0.03);
  }
